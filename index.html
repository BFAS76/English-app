<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master English AI</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #0f172a; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: white; text-align: center;
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden; touch-action: manipulation;
        }
        .container { width: 90%; max-width: 400px; padding: 25px; border-radius: 30px; background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .score-badge { background: var(--primary); color: #0f172a; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; margin-bottom: 15px; display: inline-block; }
        #phrase-display { font-size: 1.6rem; min-height: 80px; margin: 20px 0; font-weight: 600; line-height: 1.4; color: #f8fafc; }
        .controls { display: grid; gap: 15px; }
        button { 
            border: none; padding: 20px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-listen { background: #334155; color: var(--primary); border: 1px solid var(--primary); }
        .btn-speak { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: #0f172a; }
        .btn-next { background: transparent; color: #94a3b8; text-decoration: underline; font-size: 0.9rem; padding: 10px; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #94a3b8; min-height: 40px; }
        .pulse { animation: pulse-blue 1.5s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 242, 254, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="score-badge">SCORE: <span id="points">0</span></div>
    <div id="phrase-display">Click "Next" to start</div>
    
    <div class="controls">
        <button class="btn-listen" onclick="playVoice()">🔊 Hear Native</button>
        <button id="mic-btn" class="btn-speak" onclick="startRecognition()">🎤 Press & Speak</button>
        <button class="btn-next" onclick="nextPhrase()">New Challenge ➔</button>
    </div>

    <div id="status">Tap "Hear Native" first to enable sound!</div>
</div>

<script>
    const phrases = ["How are you?", "I love English", "Where is the beach?", "Have a nice day", "Practice every day"];
    let currentPhrase = "";
    let score = 0;
    
    // Deixamos a instância do reconhecimento global para não a recriar sempre
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    
    if(recognition) {
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = false;
    }

    function nextPhrase() {
        currentPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('phrase-display').innerText = currentPhrase;
        document.getElementById('status').innerText = "Ready!";
    }

    function playVoice() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentPhrase);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function startRecognition() {
        if (!recognition) return alert("Browser not supported");
        
        const micBtn = document.getElementById('mic-btn');
        const status = document.getElementById('status');

        recognition.onstart = () => {
            micBtn.classList.add('pulse');
            status.innerText = "Listening...";
        };

        recognition.onresult = (event) => {
            micBtn.classList.remove('pulse');
            const result = event.results[0][0].transcript.toLowerCase().trim();
            const target = currentPhrase.toLowerCase().replace(/[?.!,]/g, "").trim();

            if (result.includes(target) || target.includes(result)) {
                status.innerText = "🔥 PERFECT!";
                score += 10;
                document.getElementById('points').innerText = score;
            } else {
                status.innerText = `You said: "${result}"`;
            }
        };

        recognition.onerror = () => micBtn.classList.remove('pulse');
        recognition.onend = () => micBtn.classList.remove('pulse');

        recognition.start();
    }

    window.onload = nextPhrase;
</script>
</body>
</html>
