<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Master Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    
    <style>
        :root { --primary: #00f2fe; --bg: #0f172a; --card: #1e293b; --text-sec: #94a3b8; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: white; margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .category { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        #phrase-display { font-size: 1.4rem; font-weight: bold; margin: 15px 0 5px 0; color: #f8fafc; line-height: 1.3; }
        #translation-display { font-size: 1rem; color: var(--text-sec); font-style: italic; margin-bottom: 20px; min-height: 1.2em; }
        .controls { display: grid; gap: 12px; }
        button { 
            border: none; padding: 18px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.96); }
        .btn-listen { background: #334155; color: var(--primary); border: 1px solid var(--primary); }
        .btn-speak { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0f172a; }
        .btn-next { background: transparent; color: var(--text-sec); text-decoration: underline; font-size: 0.85rem; margin-top: 5px; }
        #status { margin-top: 15px; font-size: 0.9rem; color: var(--text-sec); min-height: 3em; }
        .points-box { color: #4ade80; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body onclick="initAudio()">

<div class="container">
    <div class="points-box">XP: <span id="points">0</span></div>
    <div id="cat-display" class="category">Tap to start</div>
    <div id="phrase-display">Ready?</div>
    <div id="translation-display">Clique para começar</div>
    
    <div class="controls">
        <button class="btn-listen" onclick="playVoice()">🔊 Hear Native</button>
        <button id="mic-btn" class="btn-speak" onclick="startRecognition()">🎤 Speak Now</button>
        <button class="btn-next" onclick="nextPhrase()">Skip / Next ➔</button>
    </div>
    <div id="status">Tip: Click "Hear Native" to learn the sound first!</div>
</div>

<script>
    // 📚 BIBLIOTECA DE CONTEÚDO (Podes adicionar centenas aqui!)
    const library = [
        // SAUDAÇÕES
        { cat: "Greetings", en: "Nice to meet you", pt: "Prazer em conhecê-lo" },
        { cat: "Greetings", en: "How is it going?", pt: "Como estão as coisas?" },
        { cat: "Greetings", en: "Have a wonderful day", pt: "Tenha um dia maravilhoso" },
        
        // VIAGEM
        { cat: "Travel", en: "Where can I find a taxi?", pt: "Onde posso encontrar um táxi?" },
        { cat: "Travel", en: "I am lost, can you help me?", pt: "Estou perdido, pode ajudar-me?" },
        { cat: "Travel", en: "A table for two, please", pt: "Uma mesa para dois, por favor" },
        
        // TRABALHO / DIA-A-DIA
        { cat: "Daily", en: "I need to check my emails", pt: "Preciso de ver os meus e-mails" },
        { cat: "Daily", en: "What do you do for a living?", pt: "O que fazes da vida/profissionalmente?" },
        { cat: "Daily", en: "Let's grab a coffee later", pt: "Vamos tomar um café mais tarde" },
        
        // FRASES ÚTEIS
        { cat: "Useful", en: "Could you speak slower, please?", pt: "Poderia falar mais devagar, por favor?" },
        { cat: "Useful", en: "I don't understand what you mean", pt: "Não entendo o que quer dizer" },
        { cat: "Useful", en: "How do you say this in English?", pt: "Como se diz isto em Inglês?" }
    ];

    let current = {};
    let score = 0;
    let audioInitialized = false;

    function initAudio() {
        if (audioInitialized) return;
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
        audioInitialized = true;
        if(!current.en) nextPhrase();
    }

    function nextPhrase() {
        let last = current.en;
        while(current.en === last) {
            current = library[Math.floor(Math.random() * library.length)];
        }
        document.getElementById('cat-display').innerText = current.cat;
        document.getElementById('phrase-display').innerText = current.en;
        document.getElementById('translation-display').innerText = current.pt;
        document.getElementById('status').innerText = "Listen and Repeat!";
        document.getElementById('status').style.color = "#94a3b8";
    }

    function playVoice() {
        if (!current.en) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(current.en);
        msg.lang = 'en-US';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function startRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Browser error");

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        
        recognition.onstart = () => {
            document.getElementById('status').innerText = "Listening...";
            document.getElementById('mic-btn').style.filter = "brightness(1.5)";
        };

        recognition.onresult = (event) => {
            const spoken = event.results[0][0].transcript.toLowerCase().trim().replace(/[?.!,]/g, "");
            const target = current.en.toLowerCase().replace(/[?.!,]/g, "").trim();

            if (spoken === target || target.includes(spoken) && spoken.length > 3) {
                document.getElementById('status').innerText = "✅ Excellent! +10 XP";
                document.getElementById('status').style.color = "#4ade80";
                score += 10;
                document.getElementById('points').innerText = score;
                setTimeout(nextPhrase, 2000);
            } else {
                document.getElementById('status').innerText = `You said: "${spoken}"\nTry again!`;
                document.getElementById('status').style.color = "#fb7185";
            }
        };

        recognition.onend = () => {
            document.getElementById('mic-btn').style.filter = "none";
        };

        recognition.start();
    }
</script>
</body>
</html>
